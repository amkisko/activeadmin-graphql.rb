inherit_mode:
  merge:
    - Exclude

require:
  - standard

plugins:
  - standard-custom
  - standard-performance
  - rubocop-performance
  - rubocop-rails
  - rubocop-rspec
  - rubocop-thread_safety

inherit_gem:
  standard: config/base.yml
  standard-performance: config/base.yml
  standard-custom: config/base.yml
  standard-rails: config/base.yml

AllCops:
  SuggestExtensions: false
  TargetRubyVersion: 3.2
  NewCops: enable
  Exclude:
    - gemfiles/**/*
    - bin/**/*
    - db/**/*
    - vendor/**/*
    - tmp/**/*
    - log/**/*
    - storage/**/*
    - coverage/**/*
    - uploads/**/*
    - .git/**/*
    - node_modules/**/*
    - public/packs/**/*
    - public/packs-test/**/*
    - spec/dummy/db/**/*
    - spec/dummy/log/**/*
    - spec/dummy/storage/**/*
    - spec/dummy/tmp/**/*

RSpec/ExampleLength:
  Max: 80

RSpec/SpecFilePathFormat:
  Enabled: false
  Exclude:
    - spec/**/*

RSpec/HooksBeforeExamples:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Max: 16

RSpec/NestedGroups:
  Max: 4

RSpec/RepeatedExample:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

# Request and integration-style specs often assert several things in one example.
RSpec/MultipleExpectations:
  Max: 25

RSpec/MessageSpies:
  Enabled: false

RSpec/DescribeMethod:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

Style/AccessModifierDeclarations:
  EnforcedStyle: inline

Rails/ActiveRecordCallbacksOrder:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Lint/UselessAssignment:
  Enabled: false

Rails/Exit:
  Exclude:
    - usr/**/*

ThreadSafety/ClassAndModuleAttributes:
  Enabled: false

ThreadSafety/ClassInstanceVariable:
  Enabled: false

ThreadSafety/DirChdir:
  Exclude:
    - "*.gemspec"

Lint/Debugger:
  Enabled: true
  Exclude: []

RSpec/Focus:
  Enabled: true
  Exclude: []

Rails/Output:
  Enabled: true
  Exclude:
    - usr/**/*

Rails/FindEach:
  Enabled: true
  Exclude: []

Rails/UniqBeforePluck:
  Enabled: true
  Exclude: []

Metrics/ModuleLength:
  Enabled: true
  CountAsOne: [array, hash, heredoc, method_call]
  Max: 150
Metrics/ClassLength:
  Enabled: true
  CountAsOne: [array, hash, heredoc, method_call]
  Max: 150
Metrics/CyclomaticComplexity:
  Enabled: true
  Max: 10
  Exclude:
    # GraphQL schema builder files are DSL heavy; metrics noise there.
    - lib/active_admin/graphql/schema_builder/**/*.rb
Metrics/PerceivedComplexity:
  Enabled: true
  Max: 10
  Exclude:
    - lib/active_admin/graphql/schema_builder/**/*.rb
Metrics/AbcSize:
  Enabled: true
  Max: 15
  CountRepeatedAttributes: false
  Exclude:
    - lib/active_admin/graphql/schema_builder/**/*.rb
