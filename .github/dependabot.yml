# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: bundler
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
    groups:
      bundler:
        patterns:
          - "*"
